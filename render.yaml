services:
  - type: web
    name: cehub-cs-cr-coach
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cehub-cs-cr-coach-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o

databases:
  - name: cehub-cs-cr-coach-db
    databaseName: cehub_cs_cr_coach
    user: cehub_coach
    plan: free
